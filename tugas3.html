<!DOCTYPE html>
<html>
<head>
    <title>Tabel Responsif</title>

    <style>

        /* pembungkus tabel */
        .table-wrapper {
            overflow-x: auto;
        }

        /* tabel */
        table {
            border-collapse: collapse;
            min-width: 600px;
            width: 100%;
        }

        /* border tabel */
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        /* warna header */
        th {
            background-color: lightgray;
        }

    </style>

</head>
